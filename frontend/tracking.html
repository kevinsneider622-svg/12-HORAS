<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastrear Paquete — LogiTrack CO</title>
<style>
:root {
  --brand:#E8500A; --brand-dark:#B83D06; --brand-soft:#FDF0EA;
  --ink:#1A1A1A; --muted:#6B7280; --border:#E5E7EB;
  --surface:#FFFFFF; --bg:#F5F5F0;
  --success:#16A34A; --radius:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
a{color:var(--brand);text-decoration:none}

header{
  background:linear-gradient(135deg,#1A1A1A,#B83D06);
  color:#fff;padding:2rem 1rem;text-align:center;
}
.logo{font-size:1.4rem;font-weight:800;margin-bottom:.25rem}
.sub{font-size:.9rem;opacity:.8}

main{max-width:600px;margin:0 auto;padding:2rem 1rem}

.search-card{
  background:var(--surface);border-radius:12px;
  box-shadow:0 4px 24px rgba(0,0,0,.1);
  padding:2rem;margin-bottom:1.5rem;
}
.search-row{display:flex;gap:.75rem;align-items:flex-end}
.search-row input{
  flex:1;padding:.65rem .9rem;border:1.5px solid var(--border);
  border-radius:var(--radius);font:inherit;
}
.search-row input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(232,80,10,.15)}
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.65rem 1.25rem;border-radius:var(--radius);border:none;
  font:inherit;font-weight:600;cursor:pointer;transition:.15s;
}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-dark)}

.result-card{background:var(--surface);border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.1);padding:2rem}
.badge{display:inline-block;padding:.25rem .75rem;border-radius:20px;font-size:.8rem;font-weight:700}
.badge-recibido     {background:#DBEAFE;color:#1E40AF}
.badge-transito     {background:#FEF3C7;color:#92400E}
.badge-entregado    {background:#D1FAE5;color:#065F46}
.badge-devolucion   {background:#FEE2E2;color:#991B1B}
.badge-reprogramado {background:#F3E8FF;color:#5B21B6}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:1rem 0;font-size:.875rem}
.info-item label{font-size:.72rem;color:var(--muted);display:block;margin-bottom:.1rem}
.info-item strong{font-size:.9rem}

.timeline{padding:.5rem 0}
.tl-item{display:flex;gap:.75rem;padding-bottom:1.25rem;position:relative}
.tl-item::before{content:'';position:absolute;left:11px;top:22px;bottom:0;width:2px;background:var(--border)}
.tl-item:last-child::before{display:none}
.tl-dot{width:24px;height:24px;border-radius:50%;background:var(--brand);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.7rem;margin-top:2px}
.tl-estado{font-weight:700;font-size:.875rem}
.tl-meta{font-size:.75rem;color:var(--muted);margin-top:.1rem}
.tl-comment{font-size:.8rem;color:#555;margin-top:.2rem}
.alert-error{background:#FEE2E2;color:#991B1B;padding:.75rem 1rem;border-radius:var(--radius);border:1px solid #FCA5A5;font-size:.875rem}
footer{text-align:center;padding:2rem 1rem;font-size:.8rem;color:var(--muted)}
</style>
</head>
<body>
<header>
  <div class="logo">🚚 LogiTrack CO</div>
  <div class="sub">Consulta el estado de tu paquete</div>
</header>

<main>
  <div class="search-card">
    <h2 style="font-size:1rem;font-weight:700;margin-bottom:.75rem">Ingresa tu código de seguimiento</h2>
    <div class="search-row">
      <input type="text" id="codigo" placeholder="ENV-2024-XXXXX"
             oninput="this.value=this.value.toUpperCase()"
             onkeydown="if(event.key==='Enter')rastrear()">
      <button class="btn btn-primary" onclick="rastrear()">Rastrear</button>
    </div>
  </div>

  <div id="result"></div>
</main>

<footer>
  <a href="index.html">← Ingresar a mi cuenta</a> &nbsp;·&nbsp; LogiTrack CO © 2024
</footer>

<script>
const API = 'http://localhost:3001/api';

async function rastrear() {
  const codigo = document.getElementById('codigo').value.trim();
  const res    = document.getElementById('result');
  if (!codigo) return;

  res.innerHTML = '<div style="text-align:center;color:#6B7280;padding:2rem">🔍 Buscando…</div>';

  try {
    const r    = await fetch(`${API}/envios/seguimiento/${codigo}`);
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'No encontrado');

    const estadoClass = {
      'Recibido':'badge-recibido','En Tránsito':'badge-transito',
      'Entregado':'badge-entregado','Devolución':'badge-devolucion','Reprogramado':'badge-reprogramado'
    }[data.estado] || '';

    res.innerHTML = `
      <div class="result-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <div>
            <div style="font-size:.72rem;color:#6B7280">CÓDIGO DE SEGUIMIENTO</div>
            <div style="font-weight:800;font-size:1.1rem">${data.codigo_seguimiento}</div>
          </div>
          <span class="badge ${estadoClass}">${data.estado}</span>
        </div>

        <div class="info-grid">
          <div class="info-item"><label>DESTINATARIO</label><strong>${data.destinatario_nombre}</strong></div>
          <div class="info-item"><label>CIUDAD</label><strong>${data.ciudad_entrega}</strong></div>
          <div class="info-item" style="grid-column:1/-1"><label>DIRECCIÓN</label><strong>${data.direccion_entrega}</strong></div>
          ${data.transportador_nombre ? `<div class="info-item"><label>TRANSPORTADOR</label><strong>${data.transportador_nombre}</strong></div>` : ''}
          <div class="info-item"><label>FECHA CREACIÓN</label><strong>${fmt(data.creado_en)}</strong></div>
          <div class="info-item"><label>ÚLTIMA ACTUALIZACIÓN</label><strong>${fmt(data.actualizado_en)}</strong></div>
        </div>

        <div style="border-top:1px solid #E5E7EB;padding-top:1rem;margin-top:.5rem">
          <div style="font-weight:700;font-size:.875rem;margin-bottom:.75rem">🗓️ Historial de estados</div>
          <div class="timeline">
            ${(data.historial||[]).map((h,i) => `
              <div class="tl-item">
                <div class="tl-dot">${i+1}</div>
                <div>
                  <div class="tl-estado">${h.estado}</div>
                  <div class="tl-meta">${fmt(h.registrado_en)} · ${h.actor}</div>
                  ${h.comentario ? `<div class="tl-comment">${h.comentario}</div>` : ''}
                </div>
              </div>`).join('')}
          </div>
        </div>
      </div>`;
  } catch (e) {
    res.innerHTML = `<div class="alert-error">❌ ${e.message}. Verifica el código e intenta de nuevo.</div>`;
  }
}

function fmt(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('es-CO', { dateStyle:'short', timeStyle:'short' });
}

// Pre-llenar código desde URL ?codigo=
const params = new URLSearchParams(location.search);
if (params.get('codigo')) {
  document.getElementById('codigo').value = params.get('codigo').toUpperCase();
  rastrear();
}
</script>
</body>
</html>
